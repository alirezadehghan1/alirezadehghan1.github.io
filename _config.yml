# Welcome to Jekyll!

# Site settings
locale: "en-US"
title: Alireza Dehghan
email: alirezadehghan@sharif.edu
description: >- # this means to ignore newlines until "baseurl:"
  #Write an awesome description for your new site here. You can edit this
  #line in _config.yml. It will appear in your document head meta (for
  #Google search results) and in your feed.xml site description.
github_username: https://github.com/alirezadehghan1
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
author:
  name   : "Alireza Dehghan"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "B.Sc. Student, Industrial Engineering, Sharif University of Technology (SUT)"
  location         : "Tehran, Iran"
  email            : "alirezadehghan@sharif.edu"
  links:
    #- label: "Email"
      #icon: "fas fa-fw fa-email"
      #url: "alirezadehghan@sharif.edu"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/alirezadehghan1"
    - label: "Linkedin"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/alirezadehghan1/"
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
#footer:
  #links:
    #- label: "Twitter"
      #icon: "fab fa-fw fa-twitter-square"
      #url: "https://twitter.com/"
    #- label: "GitHub"
      #icon: "fab fa-fw fa-github"
      #url: "https://github.com/"
    #- label: "Instagram"
      #icon: "fab fa-fw fa-instagram"
      #url: "https://instagram.com/"

defaults:
  # _posts
  #- scope:
  #    path: ""
   #   type: posts
    #values:
     # layout: single
      #author_profile: true
     # read_time: true
     # comments: true
     # share: true
     # related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
params:
    hideFooter: true
    socialIcons:
        - name: telegram
          url: https://t.me/ٍEinradal
    label:
      #text: "Alireza Dehghan"
      icon: /favicon.ico
      iconHeight: 18
